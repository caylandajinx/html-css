<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posição dos Fundos</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgba(0, 255, 255, 0.521);
            text-align: center;
        }

        div.bloco {
            background-image: url("imagens/wallpaper003.jpg");
            height: 200px;
            border: 1px solid black;
            border-radius: 20px;
            margin: 10px;
            width: 90%;
            margin: auto;
        }

        div#q1 {
            background-position: left top;
        }

        div#q2 {
            background-position: left center;
        }

        div#q3 {
            background-position: right bottom;
        }

        div#q4 {
            background-position: center center;
        }
    </style>
</head>
<body>
    <h1>Posição de um background</h1>

    <h2>background-position: left top;</h2>
    <div class="bloco" id="q1"></div>

    <h2>background-position: left center;</h2>
    <div class="bloco" id="q2"></div>

    <h2>background-position: right bottom;</h2>
    <div class="bloco" id="q3"></div>

    <h2>background-position: center center;</h2>
    <div class="bloco" id="q4"></div>
</body>
</html>
