<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /* Configurações globais das CSS */
            height: 100%;
        }
        body {
            /* radical-gradient(cicle,) */
            background-image: linear-gradient(to bottom, #3fb9c9, #7543CA, #AF39A4, #F14D5A);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>
    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Iure, iusto. Repellendus ipsa unde aspernatur magnam, explicabo autem. Laboriosam sed tempore officiis enim ab, maiores nulla illo vitae dolorum distinctio vero?</p>
</body>
</html>
