<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <link rel="shortcut icon" href="feio.ico" type="image/x-icon">
    <style>
        body {
            font-family: Verdana, Geneva, Tahoma, sans-serif
        }

        h1 { /* Box-level*/
            text-align: center;

            background-color: rgb(209, 252, 252);

            height: 300px;
            width: 300px;

            border: 10px solid #022501;

            padding: 5px 5px 5px 10px;

            margin: 20px auto 20px auto;

            outline: 5px dashed salmon;
        }

        a { /* Inline-level*/

            display: inline-block;
            
            border: 5px solid rebeccapurple;
            
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>Exemplos de Caixas Box-level</h1>
    <p>Parágrafos também são exemplos do box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
