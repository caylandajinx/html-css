<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            color: blue;
            background-color: aquamarine;
            width: 300px;
        }

        div:hover {
            color: rgb(189, 189, 2);
        }
    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mouse sobre o texto abaixo</p>
    <div>
        Passe o mouse aqui
        <p>TEXTO ESCONDIDO...</p>
        <p>Sentimentos... <br> Maravilha... <br>Ansiedade... <br>Pensamentos...</p>
    </div>
    <p>Fim dos Sentimentos</p>
</body>
</html>
