<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        iframe {
            width: 400px;
            height: 400px;
            background-color: aquamarine;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <!-- iframe = é um display inline 
     e algums não se conecta como por exemplo o google.
        Tamanho padão 300x150
        No tamanho quem vale é as CSS 
    scolling = Barra de rolagem
        auto = Valor padão, faz a rolagem aparecer
        yes = Força a exibição de barra de rolagem, mesmo que não tenha
        no = Bloqueia a barra de rolagem.-->
    <h1>Testando o uso de um iframe</h1>
    <p>
        Acessando o site do 

        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500" scolling="auto">
            <a href="https://www.cursoemvideo.com" target="_blank">Curso em Video</a>
        </iframe>

        para aprender a programar.
    </p>
    <p>
        O repositório do Guanabara

        <iframe src="https://gustavoguanabara.github.io" frameborder="0" height="500" width="500">
            <a href="https://gustavoguanabara.github.io" target="_blank">no GitHub</a>
        </iframe>

        também é bem legal!
    </p>
</body>
</html>
