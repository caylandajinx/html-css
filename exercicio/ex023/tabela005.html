<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        caption {
            padding: 8px;
            font-size: 1.3em;
            font-weight: bold
        }

        td, th {
            padding: 8px;
            border: 1px solid black;
        }

        .nomes {
            background-color: rgb(231, 171, 191);
        }

        .idades {
            background-color: burlywood;
        }
        
    </style>
</head>
<body>
    <h1>Exercício de Tabela</h1>
    <table>
        <colgroup>
            <col class="nomes">
            <col class="idades" span="2">
            <col class="nomes">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Gustavo</td>
            <td>M</td>
            <td>19</td>
            <td>Vendedor</td>
        </tr>
        <tr>
            <td>Cláudia</td>
            <td>F</td>
            <td>40</td>
            <td>Médica</td>
        </tr>
        <tr>
            <td>Hélio</td>
            <td>M</td>
            <td>45</td>
            <td>Programador</td>
        </tr>
        <tr>
            <td>Otávio</td>
            <td>M</td>
            <td>22</td>
            <td>Designer</td>
        </tr>
        <tr>
            <td>Flávia</td>
            <td>F</td>
            <td>25</td>
            <td>Nutricionista</td>
        </tr>
    </table>
</body>
</html>
