<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídios hospedados localmente</h1>
    <p>Este vídio está hospedado no meu próprio servidor.</p>
    <hr>
    <video width="560" controls loop>
        <source src="midia/gato.webm" type="video/webm">
        <source src="midia/gato.m4v" type="video/mp4">
        <source src="midia/gato.mp4" type="video/mp4">
        <p>Seu navegador não tem compatibilidade com a reprodução de vídeo.</p>
    </video>
    
    <h1>Inserindo vídios do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/nCKwUB8EVbc?si=cbBcWuDf4iud6moE" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
