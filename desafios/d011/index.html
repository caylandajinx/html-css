<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio do Astronauta</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        html, body {
            background-image: url("imagem/espaco.jpg");
            position: relative;
            max-height: 100vh;
            max-width: 100vw;

            background-size: cover;
            background-attachment: fixed;
            background-position: center center;
        }

        img {
            margin: auto;
            background-attachment: fixed;
            max-width: 100vw;
            max-height: 100vh;
            position: absolute;
            left: 50%;
            top: 50%;

            transform: translate(-50%);
            background-position: center center;
        }
    </style>
</head>
<body>
    <section>
        <article>
            <img src="imagem/astronauta.png" alt="Astronauta no espaço">
        </article>
    </section>
</body>
</html>
